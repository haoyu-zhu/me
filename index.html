<h1 id="_1">关于</h1>
<p>你好，我是<strong>抓鱼</strong>。这里是我记录生活与思考的地方——关于读书、电影、旅行、美食，关于 AI、数据、研究、金融，也关于画画、播客、和那段留学的时光。</p>
<p>这个网站叫「编辑部」，因为我喜欢编辑这件事：把散落的想法整理成文字，把经历过的事情变成可以分享的东西。<a href="about/">更多关于我 →</a></p>
