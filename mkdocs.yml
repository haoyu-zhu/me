site_name: 抓鱼的编辑部
site_url: https://haoyu-zhu.github.io/me/
docs_dir: docs/

theme:
  name: material
  custom_dir: overrides
  language: zh
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy

# 关闭搜索（默认的 search 插件），顶栏不再出现搜索框
plugins: []

nav:
