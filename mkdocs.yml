site_name: 抓鱼的编辑部
site_url: https://haoyu-zhu.github.io/me/
docs_dir: docs/

theme:
  name: material
  custom_dir: overrides
  language: zh
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy

# 关闭搜索（默认的 search 插件），顶栏不再出现搜索框
plugins: []

nav:
  - home:
    - index.md
    - 关于我: about/index.md
    - 播客: podcast/index.md
  - AI:
    - thinking/ai/index.md
    - Vibe Coding 产品:
      - 招聘管理系统: thinking/ai/vibe-coding/recruitment/index.md
    - Skills:
      - 财报分析: thinking/ai/skills/financial-analysis/index.md
      - 市场调研: thinking/ai/skills/market-research/index.md
      - 竞品分析: thinking/ai/skills/competitor-analysis/index.md
  - 书·影·画:
    - 书:
      - life/books/index.md
      - 年度最佳: life/books/best.md
      - 中国: life/books/china.md
      - 法国: life/books/france.md
      - 英国: life/books/uk.md
      - 美国: life/books/usa.md
    - 电影:
      - life/movies/index.md
      - 年度最佳: life/movies/best.md
      - 中国: life/movies/china.md
      - 美国: life/movies/usa.md
      - 欧洲: life/movies/europe.md
      - 日本: life/movies/japan.md
    - 画画:
      - life/art/index.md
      - 我的素描: life/art/sketch.md
      - 印象: life/art/impression.md
  - 旅行:
    - life/travel/index.md
    - 环西南省会: life/travel/southwest.md
    - 武汉: life/travel/wuhan.md
    - 寻味顺德: life/travel/shunde.md
    - 寻味江门: life/travel/jiangmen.md
    - 寻味肇庆: life/travel/zhaoqing.md
    - 台北: life/travel/taipei.md
    - 马六甲-吉隆坡大巴游: life/travel/malacca-kl.md
  - 美食: life/food/index.md
  - 笔记:
    - thinking/index.md
    - 金融: thinking/finance/index.md
  - 研究: thinking/research/index.md
  - 数据分析: thinking/data/index.md
  - 留学: life/study-abroad/index.md
  - 摄影: life/photography/index.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/haoyu-zhu
